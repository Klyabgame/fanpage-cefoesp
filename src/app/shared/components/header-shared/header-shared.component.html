<div class="w-full bg-white shadow-sm border-b border-slate-100">
  <div class="max-w-7xl mx-auto h-20 px-6 flex justify-between items-center relative">
    
    <!-- Logo -->
    <a routerLink="/main" class="flex items-center space-x-3 hover:scale-102 transition-transform duration-200">
      <app-img-skeleton [src]="environment.URL_LOGO_CEFOESP" alt="CEFOESP Logo" imgClass="h-12 w-auto object-contain" containerClass="h-12 w-32" skeletonClass="rounded-lg"></app-img-skeleton>
    </a>

    <!-- Desktop Navigation Links -->
    <ul class="hidden md:flex items-center space-x-8">
      @for (item of routerTitle(); track item) {
        @if (item.title) {
          <li>
            <a [routerLink]="item.path" 
               routerLinkActive="text-[#163168] border-[#AAAC3D] font-bold"
               [routerLinkActiveOptions]="{exact: true}"
               class="text-sm font-semibold text-slate-500 hover:text-[#163168] py-2.5 border-b-2 border-transparent transition-all duration-200">
              {{ item.title }}
            </a>
          </li>
        }
      }
    </ul>

    <!-- Desktop Call To Action -->
    <div class="hidden md:flex items-center">
      <a routerLink="/contact"
         class="bg-[#163168] text-white font-bold text-sm px-5 py-2.5 rounded-xl hover:bg-[#AAAC3D] hover:text-[#163168] transition-all duration-300 shadow-sm border border-transparent">
        Matrícula Abierta
      </a>
    </div>

    <!-- Mobile menu button -->
    <div class="flex items-center md:hidden">
      <button (click)="toggleMenu()" aria-label="Toggle Menu" class="text-slate-700 hover:text-[#163168] focus:outline-none p-2 rounded-lg bg-slate-50 hover:bg-slate-100 transition-colors">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          @if (isMenuOpen()) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16" />
          }
        </svg>
      </button>
    </div>

    <!-- Mobile Drawer Overlay -->
    <div class="absolute top-20 left-0 w-full bg-white border-b border-slate-100 shadow-lg md:hidden transition-all duration-300 ease-in-out z-40"
         [class.opacity-100]="isMenuOpen()"
         [class.translate-y-0]="isMenuOpen()"
         [class.pointer-events-auto]="isMenuOpen()"
         [class.opacity-0]="!isMenuOpen()"
         [class.-translate-y-4]="!isMenuOpen()"
         [class.pointer-events-none]="!isMenuOpen()">
      <nav class="flex flex-col p-6 space-y-4">
        @for (item of routerTitle(); track item) {
          @if (item.title) {
            <a [routerLink]="item.path"
               (click)="closeMenu()"
               routerLinkActive="text-[#163168] bg-[#163168]/5 font-bold border-l-4 border-[#AAAC3D]"
               [routerLinkActiveOptions]="{exact: true}"
               class="text-sm font-semibold text-slate-600 hover:text-[#163168] p-3 rounded-lg hover:bg-slate-50 transition-all">
              {{ item.title }}
            </a>
          }
        }
        <div class="pt-4 border-t border-slate-100">
          <a routerLink="/contact"
             (click)="closeMenu()"
             class="block text-center bg-[#163168] text-white font-bold text-sm py-3 rounded-xl hover:bg-[#AAAC3D] hover:text-[#163168] transition-all duration-300 shadow-sm">
            Matrícula Abierta
          </a>
        </div>
      </nav>
    </div>

  </div>
</div>
